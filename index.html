<!DOCTYPE html>
<html id="html-tag" lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Booking System | Ibrahim Horus</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1a5fb4; --success: #2ec27e; --danger: #ff4757; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 15px; text-align: right; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; position: relative; }
        .lang-switch { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .lang-btn { cursor: pointer; border: 1px solid #ddd; padding: 8px 12px; border-radius: 12px; background: white; font-size: 13px; }
        .input-group { margin-bottom: 15px; text-align: inherit; }
        input { width: 100%; padding: 15px; border: 2px solid #f0f0f0; border-radius: 12px; box-sizing: border-box; font-size: 16px; outline: none; text-align: inherit; }
        .btn-main { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 17px; font-weight: bold; cursor: pointer; }
        .btn-logout { background: var(--danger); color: white; border: none; padding: 8px 15px; border-radius: 10px; position: absolute; top: 10px; left: 10px; cursor: pointer; font-size: 12px; }
        .item-card { border: 1px solid #f0f0f0; padding: 15px; margin-bottom: 12px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; text-align: initial; }
        .status-badge { padding: 10px; border-radius: 10px; color: white; border: none; font-weight: bold; min-width: 100px; }
        .avail { background: var(--success); cursor: pointer; }
        .busy { background: #d1d1d1; cursor: not-allowed; }
        .policy-note { font-size: 12px; color: #666; margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; text-align: inherit; line-height: 1.6; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <button id="logout-btn" class="btn-logout hidden" onclick="location.reload()">خروج</button>
    
    <div class="header">
        <i class="fas fa-utensils" style="font-size: 40px; color: var(--primary);"></i>
        <h2 id="main-title">نظام الحجز الذكي</h2>
        <div class="lang-switch">
            <span class="lang-btn" onclick="setLang('ar')">🇪🇬 العربية</span>
            <span class="lang-btn" onclick="setLang('en')">🇺🇸 English</span>
            <span class="lang-btn" onclick="setLang('fr')">🇫🇷 Français</span>
        </div>
    </div>

    <div id="auth-section">
        <div class="input-group"><input type="text" id="c-name" placeholder="الاسم الكامل"></div>
        <div class="input-group"><input type="tel" id="c-phone" placeholder="رقم الهاتف"></div>
        <button id="login-btn" class="btn-main" onclick="login()">دخول</button>
    </div>

    <div id="booking-section" class="hidden">
        <h3 id="list-title">المساحات المتاحة</h3>
        <div id="items-list"></div>
        <button id="refresh-btn" class="btn-main" style="background:#6c757d; margin-top:10px;" onclick="loadData()">تحديث القائمة</button>
        <div class="policy-note" id="policy-text">
            * تنبيه: في حالة التأخر ساعة يتم إلغاء الحجز تلقائياً ما لم يتم إبلاغنا، ويحتسب وقت التأخير ضمن وقت الطاولة.
        </div>
    </div>
</div>

<script>
    // الرابط بتاعك
    const api_url = "https://script.google.com/macros/s/AKfycbwblKQ065B9ZUbO--37r8-izdEmLIw1yekGIbIkFqzo_ROoBdQzlhn6TWLZhqhpgbW_LA/exec"; 
    // رقم تليفونك أنت يا هيما
    const whatsapp_phone = "201210900320"; 
    
    let currentLang = 'ar';
    let user = null;
    let rawData = []; // لحفظ البيانات وترجمتها حياً

    const dict = {
        ar: { title: "نظام الحجز الذكي", name: "الاسم الكامل", phone: "رقم الهاتف", login: "دخول", list: "المساحات المتاحة", refresh: "تحديث الحالة", book: "حجز الآن", busy: "مشغول", logout: "خروج", policy: "* تنبيه: في حالة التأخر ساعة يتم إلغاء الحجز تلقائياً ما لم يتم إبلاغنا، ويحتسب وقت التأخير ضمن وقت الطاولة.", confirm: "هل تؤكد الحجز؟" },
        en: { title: "Smart Booking System", name: "Full Name", phone: "Phone Number", login: "Login", list: "Available Spaces", refresh: "Refresh", book: "Book Now", busy: "Occupied", logout: "Logout", policy: "* Note: Delay of 1 hour results in cancellation. Delay counts towards table time.", confirm: "Confirm booking?" },
        fr: { title: "Système de Réservation", name: "Nom Complet", phone: "Téléphone", login: "Connexion", list: "Espaces Disponibles", refresh: "Actualiser", book: "Réserver", busy: "Occupé", logout: "Quitter", policy: "* Note: Un retard d'une heure entraîne l'annulation. Le retard est inclus dans le temps.", confirm: "Confirmer la réservation?" }
    };

    function setLang(lang) {
        currentLang = lang;
        const d = dict[lang];
        document.getElementById('html-tag').dir = (lang === 'ar' ? 'rtl' : 'ltr');
        document.body.style.textAlign = (lang === 'ar' ? 'right' : 'left');
        document.getElementById('main-title').innerText = d.title;
        document.getElementById('c-name').placeholder = d.name;
        document.getElementById('c-phone').placeholder = d.phone;
        document.getElementById('login-btn').innerText = d.login;
        document.getElementById('list-title').innerText = d.list;
        document.getElementById('refresh-btn').innerText = d.refresh;
        document.getElementById('policy-text').innerText = d.policy;
        document.getElementById('logout-btn').innerText = d.logout;
        if(rawData.length > 0) renderData(); // إعادة رسم البيانات باللغة الجديدة
    }

    function login() {
        const n = document.getElementById('c-name').value;
        const p = document.getElementById('c-phone').value;
        if(n && p) {
            user = {name: n, phone: p};
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('booking-section').classList.remove('hidden');
            document.getElementById('logout-btn').classList.remove('hidden');
            loadData();
        } else { alert("Data Required"); }
    }

    async function loadData() {
        const list = document.getElementById('items-list');
        list.innerHTML = '<div class="loader"></div>';
        try {
            const res = await fetch(api_url);
            rawData = await res.json();
            renderData();
        } catch(e) { list.innerHTML = "Error!"; }
    }

    function renderData() {
        const list = document.getElementById('items-list');
        let h = '';
        rawData.forEach(item => {
            const isAvail = String(item.Status).toLowerCase().trim() === 'available' || item.Status === 'متاح';
            h += `
            <div class="item-card">
                <div><strong>${item.Name}</strong><br><small>${item.Features || ''}</small></div>
                <button class="status-badge ${isAvail ? 'avail' : 'busy'}" ${isAvail ? `onclick="book('${item.Name}', '${item.Price}')"` : 'disabled'}>
                    ${isAvail ? dict[currentLang].book : dict[currentLang].busy}
                </button>
            </div>`;
        });
        list.innerHTML = h;
    }

    async function book(id, price) {
        if(confirm(dict[currentLang].confirm)) {
            fetch(api_url, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({name: user.name, contact: user.phone, item_id: id, price: price})
            });

            const msg = `طلب حجز جديد:%0aالمكان: ${id}%0aالاسم: ${user.name}%0aالهاتف: ${user.phone}%0a---%0a*أوافق على سياسة التأخير.*`;
            const waUrl = `https://wa.me/${whatsapp_phone}?text=${msg}`;
            
            alert(currentLang === 'ar' ? "جاري فتح واتساب للتأكيد..." : "Opening WhatsApp...");
            window.location.href = waUrl;
        }
    }
</script>
</body>
</html>
